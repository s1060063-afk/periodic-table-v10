<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ultimate Periodic Table</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🧪 Ultimate Periodic Table</h1>
  <p>互動式元素週期表</p>
</header>

<div class="controls">
  <input id="search" placeholder="搜尋元素（H / Oxygen）">
  <button onclick="resetTable()">重置</button>
</div>

<main>
  <div id="periodic-table"></div>
</main>

<!-- 📦 彈窗 -->
<div id="modal" class="hidden">
  <div class="modal-box">
    <div id="modal-content"></div>
    <button onclick="closeModal()">關閉</button>
  </div>
</div>

<script src="elements.js"></script>
<script src="script.js"></script>

</body>
</html>
